# =============================================================================
# EMPA Function Analysis - Configuration File
# =============================================================================
# This file centralizes all configurable values for the EMPA dashboard package.
# Provide a custom config file path to load_config() to override any values.

# ---------------------------------------------------------------------------
# Data Mappings
# ---------------------------------------------------------------------------

season_months:
  Spring: [3, 4, 5, 6, 7]
  Fall: [8, 9, 10, 11, 12, 1, 2]

# Habitat aliases: only non-obvious remappings.
# All other habitat names are auto-title-cased (e.g. "Low marsh" -> "Low Marsh").
habitat_aliases:
  "Channel": "Low Marsh"
  "Unvegetated salt panne": "High Marsh"
  "Brackish marsh": "High Marsh"

# ---------------------------------------------------------------------------
# Factor Orderings
# ---------------------------------------------------------------------------

site_levels:
  - "NC-TEN"
  - "NC-BIGR"
  - "NC-NAV"
  - "NC-DRA"
  - "NC-BOL"
  - "CC-PAJ"
  - "CC-MCS"
  - "CC-CAR"
  - "CC-ADLC"
  - "CC-MOR"
  - "SC-GOL"
  - "SC-VEN"
  - "SC-MAL"
  - "SC-BOL"
  - "SC-NEW"
  - "SC-BAT"

region_levels:
  - "North"
  - "Central"
  - "South"

status_levels:
  - "native"
  - "non-native"
  - "invasive"

habitat_levels:
  - "Low Marsh"
  - "Mid Marsh"
  - "High Marsh"
  - "Upland"

cover_class_levels:
  - "Other"
  - "Upland"
  - "High"
  - "Mid"
  - "Low"
  - "Water"

extent_levels:
  - "Current Wetland Footprint"
  - "Wetland Migration/Avoid Developed (1.2 ft)"
  - "Wetland Migration/All Areas (1.2 ft)"

landcover_levels:
  - "Developed"
  - "Ag"
  - "Natural"
  - "Total Buffer"
  - "Total Open"
  - "Largest Contiguous"


# ---------------------------------------------------------------------------
# Scoring Parameters
# ---------------------------------------------------------------------------

scoring:
  # CRAM index normalization: ((value - cram_min) / cram_range) * 100
  cram_min: 25
  cram_range: 75

  # Invasive severity: start at base_score, subtract penalties
  invasive_base_score: 100
  invasive_penalties:
    "Limited": 5
    "Moderate": 10
    "High": 15

  # Missing data sentinel value used in vegetation data
  missing_data_value: -88

  # Vegetation status values to exclude from relative abundance
  veg_exclude_statuses:
    - "Not recorded"
    - "naturalized"

  # Landcover classes grouped as "natural" for buffer scoring
  natural_landcover_classes:
    - "Ag"
    - "Natural"

  # Landcover types used for contiguity calculation
  contiguity_landcovers:
    - "Largest Contiguous"
    - "Total Open"

  # Elevation/habitat zone settings
  elevation_exclude_extent: "Wetland Migration/All Areas (1.2 ft)"
  elevation_extent_mapping:
    "Current Wetland Footprint": "current_habitat_distribution"
    "Wetland Migration/Avoid Developed (1.2 ft)": "future_habitat_distribution"
  wetland_sum_zones:
    - "Low"
    - "Mid"
    - "High"

# ---------------------------------------------------------------------------
# run_all() Defaults
# ---------------------------------------------------------------------------

run_all:
  # Calendar years to include in scoring.
  # Use "all" for all available years, or list specific years:
  #   years: [2023]
  #   years: [2021, 2023, 2024]
  years: "all"

  # Seasons to include. Use "all" for both, or list specific seasons:
  #   seasons: ["Fall"]
  #   seasons: ["Spring", "Fall"]
  seasons: "all"
